<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <style>
    /* دقیقاً پالت لوگوی هدر: حباب‌ها با رنگ primary، زمینه با رنگ surface */
    .bg{ fill:#FBF8FF; }
    .fg{ fill:#565992; }
    @media (prefers-color-scheme: dark){
      .bg{ fill:#131320; }
      .fg{ fill:#C5C3EC; }
    }
  </style>
  <rect class="bg" width="24" height="24" rx="6"/>
  <!-- سه حباب bubble_chart — همان لوگوی هدر اپ -->
  <circle class="fg" cx="7.2" cy="14.6" r="3.2"/>
  <circle class="fg" cx="14.9" cy="18.1" r="2"/>
  <circle class="fg" cx="15.6" cy="9" r="4.6"/>
</svg>
